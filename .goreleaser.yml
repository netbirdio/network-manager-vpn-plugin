version: 2

project_name: nm-netbird-service

builds:
  - id: nm-netbird-service
    main: ./cmd/nm-netbird-service
    binary: nm-netbird-service
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - '7'
    flags:
      - -trimpath
    ldflags:
      - -s -w
  - id: nm-netbird-auth-dialog
    main: ./cmd/nm-netbird-auth-dialog
    binary: nm-netbird-auth-dialog
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - '7'
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: nm-netbird-service
    ids:
      - nm-netbird-service
      - nm-netbird-auth-dialog
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    wrap_in_directory: true
    files:
      - README.md
      - src: meson.build
        dst: meson.build
      - src: meson_options.txt
        dst: meson_options.txt
      - src: scripts/install-release.sh
        dst: install.sh
      - src: scripts/uninstall-release.sh
        dst: uninstall.sh
      - src: properties/meson.build
        dst: properties/meson.build
      - src: properties/nm-netbird-editor-model.c
        dst: properties/nm-netbird-editor-model.c
      - src: properties/nm-netbird-editor-model.h
        dst: properties/nm-netbird-editor-model.h
      - src: properties/nm-netbird-editor.c
        dst: properties/nm-netbird-editor.c
      - src: properties/nm-netbird-editor.h
        dst: properties/nm-netbird-editor.h
      - src: properties/nm-netbird-editor-plugin.c
        dst: properties/nm-netbird-editor-plugin.c
      - src: properties/nm-netbird-editor-model-test.c
        dst: properties/nm-netbird-editor-model-test.c
      - src: properties/nm-netbird-editor-plugin-test.c
        dst: properties/nm-netbird-editor-plugin-test.c
      - src: packaging/NetworkManager/VPN/nm-netbird-service.name
        dst: packaging/NetworkManager/VPN/nm-netbird-service.name
      - src: packaging/dbus-1/system.d/nm-netbird-service.conf
        dst: packaging/dbus-1/system.d/nm-netbird-service.conf
      - src: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf
        dst: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf

nfpms:
  - id: linux-packages
    ids:
      - nm-netbird-service
      - nm-netbird-auth-dialog
    package_name: network-manager-netbird
    vendor: NetBird
    homepage: https://netbird.io
    maintainer: NetBird <hello@netbird.io>
    description: NetworkManager VPN plugin for NetBird.
    section: net
    priority: optional
    bindir: /usr/libexec
    formats:
      - deb
      - rpm
    contents:
      - src: packaging/NetworkManager/VPN/nm-netbird-service.name
        dst: /usr/share/NetworkManager/VPN/nm-netbird-service.name
      - src: packaging/dbus-1/system.d/nm-netbird-service.conf
        dst: /usr/share/dbus-1/system.d/nm-netbird-service.conf
      - src: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf
        dst: /etc/NetworkManager/conf.d/90-netbird-unmanaged.conf
        type: config|noreplace
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      postremove: packaging/scripts/postremove.sh
    overrides:
      deb:
        dependencies:
          - network-manager
          - netbird
      rpm:
        dependencies:
          - NetworkManager
          - netbird

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
