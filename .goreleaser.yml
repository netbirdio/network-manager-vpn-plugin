version: 2

project_name: nm-netbird-service

git:
  # The snapshot GitHub release is backed by a moving non-semver tag.
  ignore_tags:
    - snapshot

snapshot:
  # Keep nFPM, RPM spec, and Debian package versions compatible.
  version_template: '{{ incpatch .Version }}~snapshot.{{ .ShortCommit }}'

builds:
  - id: nm-netbird-service
    main: ./cmd/nm-netbird-service
    binary: nm-netbird-service
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - '7'
    flags:
      - -trimpath
    ldflags:
      - -s -w
  - id: nm-netbird-auth-dialog
    main: ./cmd/nm-netbird-auth-dialog
    binary: nm-netbird-auth-dialog
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - '7'
    flags:
      - -trimpath
    ldflags:
      - -s -w
  - id: nm-netbird-service-package-amd64
    main: ./cmd/nm-netbird-service
    binary: nm-netbird-service
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
  - id: nm-netbird-auth-dialog-package-amd64
    main: ./cmd/nm-netbird-auth-dialog
    binary: nm-netbird-auth-dialog
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: nm-netbird-service
    ids:
      - nm-netbird-service
      - nm-netbird-auth-dialog
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    wrap_in_directory: true
    files:
      - README.md
      - LICENSE
      - src: meson.build
        dst: meson.build
      - src: meson_options.txt
        dst: meson_options.txt
      - src: scripts/install-release.sh
        dst: install.sh
      - src: scripts/uninstall-release.sh
        dst: uninstall.sh
      - src: properties/meson.build
        dst: properties/meson.build
      - src: properties/nm-netbird-editor-model.c
        dst: properties/nm-netbird-editor-model.c
      - src: properties/nm-netbird-editor-model.h
        dst: properties/nm-netbird-editor-model.h
      - src: properties/nm-netbird-editor.c
        dst: properties/nm-netbird-editor.c
      - src: properties/nm-netbird-editor.h
        dst: properties/nm-netbird-editor.h
      - src: properties/nm-netbird-editor-plugin.c
        dst: properties/nm-netbird-editor-plugin.c
      - src: properties/nm-netbird-editor-model-test.c
        dst: properties/nm-netbird-editor-model-test.c
      - src: properties/nm-netbird-editor-plugin-test.c
        dst: properties/nm-netbird-editor-plugin-test.c
      - src: packaging/NetworkManager/VPN/nm-netbird-service.name
        dst: packaging/NetworkManager/VPN/nm-netbird-service.name
      - src: packaging/dbus-1/system.d/nm-netbird-service.conf
        dst: packaging/dbus-1/system.d/nm-netbird-service.conf
      - src: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf
        dst: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf

source:
  enabled: true
  name_template: 'network-manager-netbird-{{ .Version }}'
  prefix_template: 'network-manager-netbird-{{ .Version }}/'

srpm:
  enabled: true
  package_name: network-manager-netbird
  spec_file: packaging/rpm/network-manager-netbird.spec.tmpl
  import_path: github.com/netbirdio/network-manager-plugin
  nfpmrpm:
    summary: NetworkManager VPN plugin for NetBird
    group: Applications/Internet
  license: BSD-3-Clause
  license_file_name: LICENSE
  url: https://github.com/netbirdio/network-manager-vpn-plugin
  description: |
    NetworkManager VPN plugin that controls the local NetBird daemon over gRPC.
  packager: NetBird <hello@netbird.io>
  vendor: NetBird
  docs:
    - README.md
    - docs/reference.md
    - docs/architecture.md

# Two single-format nfpm definitions (instead of one combined deb+rpm entry) so
# that each artifact carries a distinct id the `uploads` pipe can target. The
# packages are amd64-only because the bundled GTK/NM editor .so files are built
# by the C toolchain on the amd64 runner; both entries reference the dedicated
# amd64-only Go builds for the same reason.
nfpms:
  - id: linux-packages-deb
    ids:
      - nm-netbird-service-package-amd64
      - nm-netbird-auth-dialog-package-amd64
    package_name: network-manager-netbird
    vendor: NetBird
    homepage: https://netbird.io
    maintainer: NetBird <hello@netbird.io>
    description: NetworkManager VPN plugin for NetBird.
    license: BSD-3-Clause
    section: net
    priority: optional
    bindir: /usr/libexec
    formats:
      - deb
    dependencies:
      - network-manager
      - netbird
      - libnm0
      - libgtk-3-0
      - libnma0
      - xdg-utils
      - libgtk-4-1
      - libnma-gtk4-0
    contents:
      - src: bin/linux_amd64/libnm-vpn-plugin-netbird.so
        dst: /usr/lib/NetworkManager/libnm-vpn-plugin-netbird.so
      - src: bin/linux_amd64/libnm-vpn-plugin-netbird-editor.so
        dst: /usr/lib/NetworkManager/libnm-vpn-plugin-netbird-editor.so
      - src: bin/linux_amd64/libnm-gtk4-vpn-plugin-netbird-editor.so
        dst: /usr/lib/NetworkManager/libnm-gtk4-vpn-plugin-netbird-editor.so
      - src: packaging/NetworkManager/VPN/nm-netbird-service.name
        dst: /etc/NetworkManager/VPN/nm-netbird-service.name
      - src: packaging/dbus-1/system.d/nm-netbird-service.conf
        dst: /usr/share/dbus-1/system.d/nm-netbird-service.conf
      - src: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf
        dst: /etc/NetworkManager/conf.d/90-netbird-unmanaged.conf
        type: config|noreplace
      - src: LICENSE
        dst: /usr/share/doc/network-manager-netbird/LICENSE
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      postremove: packaging/scripts/postremove.sh
  - id: linux-packages-rpm
    ids:
      - nm-netbird-service-package-amd64
      - nm-netbird-auth-dialog-package-amd64
    package_name: network-manager-netbird
    vendor: NetBird
    homepage: https://netbird.io
    maintainer: NetBird <hello@netbird.io>
    description: NetworkManager VPN plugin for NetBird.
    license: BSD-3-Clause
    bindir: /usr/libexec
    formats:
      - rpm
    dependencies:
      - NetworkManager
      - netbird
      - NetworkManager-libnm
      - gtk3
      - libnma
      - xdg-utils
      - gtk4
      - libnma-gtk4
    contents:
      - src: bin/linux_amd64/libnm-vpn-plugin-netbird.so
        dst: /usr/lib/NetworkManager/libnm-vpn-plugin-netbird.so
      - src: bin/linux_amd64/libnm-vpn-plugin-netbird-editor.so
        dst: /usr/lib/NetworkManager/libnm-vpn-plugin-netbird-editor.so
      - src: bin/linux_amd64/libnm-gtk4-vpn-plugin-netbird-editor.so
        dst: /usr/lib/NetworkManager/libnm-gtk4-vpn-plugin-netbird-editor.so
      - src: packaging/NetworkManager/VPN/nm-netbird-service.name
        dst: /etc/NetworkManager/VPN/nm-netbird-service.name
      - src: packaging/dbus-1/system.d/nm-netbird-service.conf
        dst: /usr/share/dbus-1/system.d/nm-netbird-service.conf
      - src: packaging/NetworkManager/conf.d/90-netbird-unmanaged.conf
        dst: /etc/NetworkManager/conf.d/90-netbird-unmanaged.conf
        type: config|noreplace
      - src: packaging/selinux/nm_netbird.pp
        dst: /usr/share/selinux/packages/nm_netbird.pp
      - src: LICENSE
        dst: /usr/share/doc/network-manager-netbird/LICENSE
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      postremove: packaging/scripts/postremove.sh

# Publish the freshly built packages to the NetBird apt/yum repositories. These
# run in the publish phase, so they are skipped automatically for snapshot builds
# (which pass --skip=publish) and only fire on tagged releases. The legacy
# wiretrustee.com hostname is the authenticated upload endpoint; users access the
# same repositories through the canonical pkgs.netbird.io hostname documented in
# the README. Authentication uses the UPLOAD_DEBIAN_SECRET / UPLOAD_YUM_SECRET
# env vars (set in CI).
uploads:
  - name: debian
    ids:
      - linux-packages-deb
    exts:
      - deb
    mode: archive
    target: https://pkgs.wiretrustee.com/debian/pool/{{ .ArtifactName }};deb.distribution=stable;deb.component=main;deb.architecture=amd64;deb.package=
    custom_artifact_name: true
    username: dev@wiretrustee.com
    method: PUT
  - name: yum
    ids:
      - linux-packages-rpm
    exts:
      - rpm
    mode: archive
    target: https://pkgs.wiretrustee.com/yum/amd64
    username: dev@wiretrustee.com
    method: PUT

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: git
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
