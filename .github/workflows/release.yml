name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

env:
  GORELEASER_VER: "v2.16.0"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || github.actor_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ runner.os }}-gotest-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gotest-
            ${{ runner.os }}-go-

      - name: Install C editor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libnm-dev libgtk-3-dev libnma-dev libgtk-4-dev

      - name: Install modules
        run: go mod tidy

      - name: Check git status
        run: git --no-pager diff --exit-code

      - name: Run Go tests
        run: go test ./...

      - name: Build properties editor
        run: |
          mkdir -p bin
          cc -Wall -Wextra -fPIC -shared -o bin/libnm-vpn-plugin-netbird.so \
            properties/nm-netbird-editor-plugin.c \
            $(pkg-config --cflags --libs libnm) \
            -ldl
          cc -Wall -Wextra \
            -DGDK_VERSION_MIN_REQUIRED=GDK_VERSION_3_22 \
            -DGDK_VERSION_MAX_ALLOWED=GDK_VERSION_3_22 \
            -fPIC -shared -o bin/libnm-vpn-plugin-netbird-editor.so \
            properties/nm-netbird-editor-model.c \
            properties/nm-netbird-editor.c \
            $(pkg-config --cflags --libs libnm gtk+-3.0 libnma)
          if pkg-config --exists gtk4 libnma-gtk4; then
            cc -Wall -Wextra \
              -DGDK_VERSION_MIN_REQUIRED=GDK_VERSION_4_0 \
              -DGDK_VERSION_MAX_ALLOWED=GDK_VERSION_4_0 \
              -fPIC -shared -o bin/libnm-gtk4-vpn-plugin-netbird-editor.so \
              properties/nm-netbird-editor-model.c \
              properties/nm-netbird-editor.c \
              $(pkg-config --cflags --libs libnm gtk4 libnma-gtk4)
          else
            echo "Skipping GTK4 editor build because libnma-gtk4 is not available on this runner"
          fi

      - name: Run properties editor tests
        run: |
          mkdir -p bin
          cc -Wall -Wextra -o bin/nm-netbird-editor-model-test \
            properties/nm-netbird-editor-model.c \
            properties/nm-netbird-editor-model-test.c \
            $(pkg-config --cflags --libs libnm)
          ./bin/nm-netbird-editor-model-test
          cc -Wall -Wextra -o bin/nm-netbird-editor-plugin-test \
            properties/nm-netbird-editor-plugin-test.c \
            $(pkg-config --cflags --libs libnm)
          NETBIRD_EDITOR_PLUGIN_PATH="$PWD/bin/libnm-vpn-plugin-netbird.so" ./bin/nm-netbird-editor-plugin-test

      - name: Build and validate Fedora SELinux policy module
        run: scripts/build-fedora-selinux-policy.sh

      - name: Run race tests
        run: go test -race ./...

  properties-arm64:
    name: Build ARM64 properties editor modules
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install properties editor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file pkg-config libnm-dev libgtk-3-dev libnma-dev libgtk-4-dev libnma-gtk4-dev

      - name: Build properties editor modules
        run: scripts/build-release-properties.sh bin/linux_arm64

      - name: Verify ARM64 modules
        run: |
          for library in bin/linux_arm64/*.so; do
            file "$library" | grep "ARM aarch64"
          done

      - name: Upload ARM64 properties editor modules
        uses: actions/upload-artifact@v4
        with:
          name: properties-editor-linux-arm64
          path: bin/linux_arm64/*.so
          if-no-files-found: error
          retention-days: 1

  snapshot:
    name: Build snapshot artifacts
    needs: [test, properties-arm64]
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # It is required for GoReleaser to work properly

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ runner.os }}-go-releaser-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-releaser-

      - name: Install modules
        run: go mod tidy

      - name: Check git status
        run: git --no-pager diff --exit-code

      - name: Install properties editor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libnm-dev libgtk-3-dev libnma-dev libgtk-4-dev libnma-gtk4-dev

      - name: Build properties editor modules
        run: scripts/build-release-properties.sh

      - name: Download ARM64 properties editor modules
        uses: actions/download-artifact@v4
        with:
          name: properties-editor-linux-arm64
          path: bin/linux_arm64

      - name: Build and validate Fedora SELinux policy module
        run: scripts/build-fedora-selinux-policy.sh

      # Sign RPMs whenever the signing key is available (pushes to main and
      # same-repo PRs). Fork PRs have no secrets, so the key file env var stays
      # unset and the conditional key_file template in .goreleaser.yml skips
      # signing instead of failing the build.
      - name: Decode GPG signing key
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          GPG_RPM_PRIVATE_KEY: ${{ secrets.GPG_RPM_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_RPM_PRIVATE_KEY" ]; then
            echo "GPG_RPM_PRIVATE_KEY is not available; RPM packages will not be signed"
            exit 0
          fi
          echo "$GPG_RPM_PRIVATE_KEY" | base64 -d > /tmp/gpg-rpm-signing-key.asc
          echo "GPG_RPM_KEY_FILE=/tmp/gpg-rpm-signing-key.asc" >> $GITHUB_ENV

      - name: Build snapshot artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VER }}
          args: release --snapshot --clean --skip=publish
        env:
          GPG_RPM_KEY_FILE: ${{ env.GPG_RPM_KEY_FILE }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_RPM_PASSPHRASE }}

      - name: Verify RPM signatures
        if: env.GPG_RPM_KEY_FILE != ''
        run: |
          docker run --rm -v "$(pwd)/dist:/dist" fedora:41 bash -c '
            dnf install -y -q rpm-sign curl >/dev/null 2>&1
            curl -sSL https://pkgs.netbird.io/yum/repodata/repomd.xml.key -o /tmp/rpm-pub.key
            rpm --import /tmp/rpm-pub.key
            echo "=== Verifying RPM signatures ==="
            status=0
            for rpm_file in /dist/*.rpm; do
              [ -f "$rpm_file" ] || continue
              case "$rpm_file" in *.src.rpm) continue ;; esac
              echo "--- $(basename "$rpm_file") ---"
              output=$(rpm -K "$rpm_file")
              echo "$output"
              case "$output" in
                *"signatures OK"*) ;;
                *)
                  echo "ERROR: missing or invalid GPG signature"
                  status=1
                  ;;
              esac
            done
            exit $status
          '

      - name: Clean up GPG key
        if: always()
        run: rm -f /tmp/gpg-rpm-signing-key.asc

      - name: Upload nm-netbird-service Linux snapshot
        uses: actions/upload-artifact@v4
        with:
          name: nm-netbird-service-linux-snapshot
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/checksums.txt
          if-no-files-found: error
          retention-days: 7

  publish-snapshot:
    name: Publish snapshot release
    needs: snapshot
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download snapshot artifacts
        uses: actions/download-artifact@v4
        with:
          name: nm-netbird-service-linux-snapshot
          path: dist

      - name: Publish snapshot release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f snapshot "$GITHUB_SHA"
          git push --force origin refs/tags/snapshot

          notes="Latest successful main branch snapshot. This release is overwritten by each successful main build."
          if gh release view snapshot >/dev/null 2>&1; then
            gh release edit snapshot --title "Snapshot" --notes "$notes" --prerelease
          else
            gh release create snapshot --title "Snapshot" --notes "$notes" --prerelease --latest=false
          fi

          gh release upload snapshot dist/*.tar.gz dist/*.deb dist/*.rpm dist/checksums.txt --clobber

  release:
    name: Publish release artifacts
    needs: [test, properties-arm64]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # It is required for GoReleaser to work properly

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Get Go environment
        run: |
          echo "cache=$(go env GOCACHE)" >> $GITHUB_ENV
          echo "modcache=$(go env GOMODCACHE)" >> $GITHUB_ENV

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.cache }}
            ${{ env.modcache }}
          key: ${{ runner.os }}-go-releaser-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-releaser-

      - name: Install modules
        run: go mod tidy

      - name: Check git status
        run: git --no-pager diff --exit-code

      - name: Install properties editor dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libnm-dev libgtk-3-dev libnma-dev libgtk-4-dev libnma-gtk4-dev

      - name: Build properties editor modules
        run: scripts/build-release-properties.sh

      - name: Download ARM64 properties editor modules
        uses: actions/download-artifact@v4
        with:
          name: properties-editor-linux-arm64
          path: bin/linux_arm64

      - name: Build and validate Fedora SELinux policy module
        run: scripts/build-fedora-selinux-policy.sh

      # Fail fast if any release secret is missing: the RPM signature template
      # in .goreleaser.yml silently skips signing when the key is absent, and a
      # tagged release must never upload unsigned RPMs to the yum repository
      # (users install with gpgcheck=1).
      - name: Require package upload and signing secrets
        env:
          PKG_UPLOAD_SECRET: ${{ secrets.PKG_UPLOAD_SECRET }}
          GPG_RPM_PRIVATE_KEY: ${{ secrets.GPG_RPM_PRIVATE_KEY }}
          GPG_RPM_PASSPHRASE: ${{ secrets.GPG_RPM_PASSPHRASE }}
        run: |
          for secret in PKG_UPLOAD_SECRET GPG_RPM_PRIVATE_KEY GPG_RPM_PASSPHRASE; do
            if [ -z "${!secret}" ]; then
              echo "::error::$secret is not configured"
              exit 1
            fi
          done

      - name: Decode GPG signing key
        env:
          GPG_RPM_PRIVATE_KEY: ${{ secrets.GPG_RPM_PRIVATE_KEY }}
        run: |
          echo "$GPG_RPM_PRIVATE_KEY" | base64 -d > /tmp/gpg-rpm-signing-key.asc
          echo "GPG_RPM_KEY_FILE=/tmp/gpg-rpm-signing-key.asc" >> $GITHUB_ENV

      - name: Publish release artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VER }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_DEBIAN_SECRET: ${{ secrets.PKG_UPLOAD_SECRET }}
          UPLOAD_DEBIAN_ARM64_SECRET: ${{ secrets.PKG_UPLOAD_SECRET }}
          UPLOAD_YUM_SECRET: ${{ secrets.PKG_UPLOAD_SECRET }}
          UPLOAD_YUM_ARM64_SECRET: ${{ secrets.PKG_UPLOAD_SECRET }}
          GPG_RPM_KEY_FILE: ${{ env.GPG_RPM_KEY_FILE }}
          NFPM_PASSPHRASE: ${{ secrets.GPG_RPM_PASSPHRASE }}

      - name: Verify RPM signatures
        run: |
          docker run --rm -v "$(pwd)/dist:/dist" fedora:41 bash -c '
            dnf install -y -q rpm-sign curl >/dev/null 2>&1
            curl -sSL https://pkgs.netbird.io/yum/repodata/repomd.xml.key -o /tmp/rpm-pub.key
            rpm --import /tmp/rpm-pub.key
            echo "=== Verifying RPM signatures ==="
            status=0
            for rpm_file in /dist/*.rpm; do
              [ -f "$rpm_file" ] || continue
              case "$rpm_file" in *.src.rpm) continue ;; esac
              echo "--- $(basename "$rpm_file") ---"
              output=$(rpm -K "$rpm_file")
              echo "$output"
              case "$output" in
                *"signatures OK"*) ;;
                *)
                  echo "ERROR: missing or invalid GPG signature"
                  status=1
                  ;;
              esac
            done
            exit $status
          '

      - name: Clean up GPG key
        if: always()
        run: rm -f /tmp/gpg-rpm-signing-key.asc
